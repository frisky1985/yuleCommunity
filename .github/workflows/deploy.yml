name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yuleCommunity
        uses: actions/checkout@v4
        with:
          path: ./yuleCommunity

      - name: Checkout yuleASR-Configurator
        uses: actions/checkout@v4
        with:
          repository: frisky1985/yuleASR-Configurator
          token: ${{ secrets.GITHUB_TOKEN }}
          path: ./yuleASR-Configurator

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            yuleCommunity/package-lock.json
            yuleASR-Configurator/apps/yuleasr-web/package-lock.json

      - name: Build yuleCommunity
        working-directory: ./yuleCommunity
        run: |
          npm ci
          npm run build

      - name: Build yuleASR-Configurator
        working-directory: ./yuleASR-Configurator/apps/yuleasr-web
        run: |
          npm ci
          npx vite build

      - name: Bundle configurator
        run: |
          cp -r ./yuleASR-Configurator/apps/yuleasr-web/dist ./yuleCommunity/dist/configurator

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./yuleCommunity/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
