name: DevHub Preview Build

on:
  push:
    branches: [devhub]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - name: Save build info
        run: |
          echo "BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
          echo "COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
      - name: Comment build status
        uses: actions/github-script@v7
        with:
          script: |
            const { BUILD_TIME, COMMIT_SHA } = process.env;
            const shortSha = COMMIT_SHA.substring(0, 7);
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `✅ **DevHub preview build complete**\n- Commit: \`${shortSha}\`\n- Build time: ${BUILD_TIME}\n- Download artifact: [GitHub Actions run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\nTo deploy this build locally:\n\`\`\`bash\ncd /home/admin/workspace/yuleCommunity\ngit checkout devhub\nnpx vite build\nnpx vite preview --port 4190\n\`\`\``
            });
