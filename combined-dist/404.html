<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>yuleCommunity</title>
  <script>
    // GitHub Pages SPA redirect
    // Redirects all 404s to index.html with the original path preserved
    const segment = 1; // Change this if your repo is not at root
    const location = window.location;
    const path = location.pathname.split('/').slice(segment).join('/');
    const redirectUrl = location.origin + location.pathname.split('/').slice(0, segment + 1).join('/') + '/?p=/' + path;
    location.replace(redirectUrl);
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
