version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: yulecommunity-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: yulecommunity
      POSTGRES_USER: yulecommunity
      POSTGRES_PASSWORD: yulecommunity
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yulecommunity -d yulecommunity"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yulecommunity-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://yulecommunity:yulecommunity@db:5432/yulecommunity
      JWT_SECRET: ${JWT_SECRET:-yulecommunity-dev-secret-2026}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
